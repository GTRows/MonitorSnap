name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: TypeScript check
        working-directory: electron-app
        run: npx tsc --noEmit

  build-electron:
    runs-on: windows-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python backend imports
        run: python -c "from display_presets.server import main"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build Electron app
        working-directory: electron-app
        run: npm run electron:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DisplayPresets-Windows
          path: electron-app/release/*.exe
