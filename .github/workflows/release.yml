name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build and release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python backend
        run: |
          python -m py_compile display_presets/server.py
          python -c "from display_presets.server import main; from display_presets.cli import run_cli"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: TypeScript check
        working-directory: electron-app
        run: npx tsc --noEmit

      - name: Run Python tests
        shell: bash
        run: |
          if [ -d "tests" ] && ls tests/test_*.py tests/*_test.py 2>/dev/null | head -1 > /dev/null 2>&1; then
            pip install pytest
            python -m pytest tests/ -v
          else
            echo "No Python tests found, skipping"
          fi

      - name: Run frontend tests
        working-directory: electron-app
        shell: bash
        run: |
          if node -e "const p = require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)" 2>/dev/null; then
            npm test
          else
            echo "No frontend test script found, skipping"
          fi

      - name: Build Electron app
        working-directory: electron-app
        run: npm run electron:build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: electron-app/release/*.exe
          body: |
            ## DisplayPresets ${{ github.ref_name }}

            Download the installer (.exe) and run it. Python 3.10+ must be installed on the system.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
