name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build and release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python backend
        run: |
          python -m py_compile display_presets/server.py
          python -c "from display_presets.server import main; from display_presets.cli import run_cli"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: TypeScript check
        working-directory: electron-app
        run: npx tsc --noEmit

      - name: Run Python tests
        shell: bash
        run: |
          if [ -d "tests" ] && ls tests/test_*.py tests/*_test.py 2>/dev/null | head -1 > /dev/null 2>&1; then
            pip install pytest
            python -m pytest tests/ -v
          else
            echo "No Python tests found, skipping"
          fi

      - name: Run frontend tests
        working-directory: electron-app
        shell: bash
        run: |
          if node -e "const p = require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)" 2>/dev/null; then
            npm test
          else
            echo "No frontend test script found, skipping"
          fi

      - name: Build Python backend (PyInstaller)
        shell: bash
        run: |
          pip install pyinstaller==6.16.0
          pyinstaller \
            --onefile \
            --name monitorsnap-backend \
            --console \
            --clean \
            --noconfirm \
            --distpath dist-backend \
            --workpath build-backend \
            --hidden-import display_presets.autostart \
            --hidden-import display_presets.store \
            --hidden-import display_presets.displays \
            --hidden-import display_presets.display_config \
            --hidden-import display_presets.settings \
            --hidden-import display_presets.logger \
            --hidden-import display_presets.config \
            backend_main.py
          ls -la dist-backend/

      - name: Build Electron app
        working-directory: electron-app
        run: npm run electron:build

      - name: Generate release notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          {
            echo "## MonitorSnap ${TAG}"
            echo ""
            echo "### Downloads"
            echo ""
            echo "- **Installer** (\`DisplayPresets-Setup-*.exe\`): standard Windows installer with Start Menu entry and uninstaller."
            echo "- **Portable** (\`DisplayPresets-Portable-*.exe\`): single-file executable, no install required. Runs from USB sticks or any folder."
            echo ""
            echo "### Requirements"
            echo ""
            echo "- Windows 10 or 11 (x64)"
            echo "- No runtime dependencies. The Python backend is bundled inside the app."
            echo ""
            echo "### Changes"
            echo ""
            if [ -n "$PREV" ]; then
              git log --pretty=format:'- %s (%h)' "${PREV}..${TAG}" | grep -v "^- Merge " || true
              echo ""
              echo ""
              echo "**Full changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
            else
              echo "- Initial release"
            fi
          } > release_notes.md
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: electron-app/release/*.exe
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
