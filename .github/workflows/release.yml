name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python backend
        run: python -c "from display_presets.server import main"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build Electron app
        working-directory: electron-app
        run: npm run electron:build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: electron-app/release/*.exe
          body: |
            ## DisplayPresets ${{ github.ref_name }}

            Download the installer (.exe) and run it. Python 3.10+ must be installed on the system.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
