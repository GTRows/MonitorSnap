name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  python:
    name: Python tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify backend imports
        run: |
          python -m py_compile display_presets/server.py
          python -c "from display_presets.server import main; from display_presets.cli import run_cli"

      - name: Install pytest
        run: pip install pytest

      - name: Run pytest
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci --omit=optional

      - name: TypeScript check
        working-directory: electron-app
        run: npx tsc --noEmit

      - name: Run vitest
        working-directory: electron-app
        run: npm test
